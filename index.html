  margin:0;
  font-family:'Orbitron',Arial,sans-serif;
  color:white;
  text-align:center;
  background:url("your-background.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow-x:hidden;
  position:relative;
}

body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 25% 30%,rgba(145,71,255,.3),transparent 40%),radial-gradient(circle at 70% 70%,rgba(255,71,200,.25),transparent 40%);
  animation:moveGlow 14s infinite alternate;
  pointer-events:none;
  z-index:1;
}

@keyframes moveGlow{
  0%{background-position:0% 0%,100% 100%;}
  100%{background-position:100% 0%,0% 100%;}
}

.nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,.7);
  padding:12px 0;
  z-index:10;
}

.nav a{
  margin:0 12px;
  color:#ff8c00;
  text-decoration:none;
  font-weight:700;
}

.hero{
  padding:140px 15px 60px;
}

.logo{
  width:220px;
  border-radius:15px;
  box-shadow:0 0 80px #ff8c00;
}

h1{
  font-size:2.4em;
  text-shadow:0 0 15px #ff8c00;
}

.live-now{
  display:inline-block;
  background:linear-gradient(90deg,#ff0000,#ff8c00);
  padding:12px 25px;
  border-radius:15px;
  margin:20px 0;
  color:white;
  text-decoration:none;
}

.stream,.youtube{

  max-width:900px;
  height:400px;
  border-radius:20px;
  margin:20px auto;
  display:block;
}

.section{
  padding:60px 15px;
}

.chat{
  width:95%;
  max-width:400px;
  height:360px;
  margin:auto;
}

.clips{
  display:flex;
  gap:20px;
  overflow-x:auto;
  justify-content:center;
  padding:10px;
}

.clip{
  min-width:320px;
  height:180px;
  border-radius:15px;
  transition:0.3s;
}

.clip:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #ff8c00;
}

.schedule{
  background:rgba(20,20,37,.85);
  padding:20px;
  border-radius:20px;
  max-width:600px;
  margin:auto;
}

table{
  width:100%;

.social a{

  color:#ff8c00;

footer{
