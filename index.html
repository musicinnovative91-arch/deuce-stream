<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deuce Prolifik | Gaming Stream</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family: 'Orbitron', Arial, sans-serif;
  color:white;
  text-align:center;
  background:url("your-background.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow-x:hidden;
}

body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 25% 30%,rgba(145,71,255,.4),transparent 40%),radial-gradient(circle at 70% 70%,rgba(145,71,255,.3),transparent 40%);
  animation:moveGlow 14s infinite alternate;
  pointer-events:none;
}

@keyframes moveGlow {
  0% { background-position: 0% 0%, 100% 100%; }
  100% { background-position: 100% 0%, 0% 100%; }
}

/* Navigation */
.nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,.85);
  padding:15px 0;
  z-index:10;
  box-shadow: 0 0 20px rgba(0,0,0,0.7);
}

.nav a{
  margin:0 15px;
  color:#a970ff;
  text-decoration:none;
  font-weight:700;
  transition: 0.3s;
  font-size:1em;
}
.nav a:hover{
  color:#ff49f0;
  text-shadow: 0 0 10px #ff49f0;
}

/* Hero Section */
.hero{
  padding:140px 20px 60px;
}

.logo{
  width:280px;
  border-radius:15px;
  box-shadow:0 0 50px rgba(145,71,255,.8);
  margin-bottom:20px;
}

h1{
  font-size:2.8em;
  margin:0 0 15px;
  color: #fff;
  text-shadow: 0 0 15px #9146FF, 0 0 30px #FF00FF;
}

/* LIVE NOW Button */
.live-now {
  display:inline-block;
  background: linear-gradient(90deg, #ff0000, #ff4d4d);
  color:white;
  font-weight:bold;
  padding:12px 25px;
  border-radius:12px;
  margin-bottom:20px;
  text-decoration:none;
  font-size:1.3em;
  box-shadow:0 0 35px rgba(255,0,0,0.7);
  animation: pulse 1.2s infinite;
  text-transform: uppercase;
}

@keyframes pulse {
  0% { box-shadow: 0 0 15px rgba(255,0,0,0.5); transform: scale(1); }
  50% { box-shadow: 0 0 50px rgba(255,0,0,1); transform: scale(1.05); }
  100% { box-shadow: 0 0 15px rgba(255,0,0,0.5); transform: scale(1); }
}

/* Streams & YouTube */
.stream, .youtube{
  width:95%;
  max-width:900px;
  height:520px;
  border-radius:15px;
  margin:25px auto;
  display:block;
  box-shadow:0 0 50px rgba(145,71,255,0.6);
}

/* Sections */
.section{
  padding:60px 20px;
}

h2{
  font-size:2.2em;
  color:#fff;
  text-shadow: 0 0 10px #9146FF, 0 0 25px #FF00FF;
  margin-bottom:25px;
}

/* Clips Section */
.clips{
  display:flex;
  gap:15px;
  overflow-x:auto;
  justify-content:center;
}
.clip{
  min-width:280px;
  height:180px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(255,0,255,0.5);
}

/* Schedule */
.schedule{
  background:rgba(20,20,37,.85);
  padding:20px;
  border-radius:15px;
  max-width:600px;
  margin:auto;
  box-shadow:0 0 25px rgba(145,71,255,0.5);
}
table{
  width:100%;
  border-collapse: collapse;
}
td, th{
  padding:12px;
  font-weight:600;
}

/* Live Chat */
.chat{
  width:100%;
  max-width:380px;
  height:400px;
  border-radius:15px;
  margin:20px auto;
  box-shadow:0 0 30px rgba(145,71,255,0.5);
}

/* Social Links */
.social a{
  margin:0 15px;
  font-weight:bold;
  text-decoration:none;
  font-size:1.2em;
  transition:0.3s;
}
.social a:hover{
  text-shadow:0 0 15px #ff49f0;
}
.instagram{color:#E1306C;}
.tiktok{color:#69C9D0;}
.youtubeLink{color:#FF0000;}
.twitch{color:#9146FF;}

/* Games Logos */
.games-logos {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
  margin-top:20px;
}
.games-logos img {
  width:100px;
  height:auto;
  border-radius:10px;
  box-shadow:0 0 20px rgba(145,71,255,0.6);
  transition: transform 0.3s, box-shadow 0.6s;
  animation: pulseGames 2s infinite alternate;
}
.games-logos img:hover {
  transform: scale(1.15);
  box-shadow:0 0 50px rgba(145,71,255,1);
}
@keyframes pulseGames {
  0% { box-shadow:0 0 15px rgba(145,71,255,0.4); }
  50% { box-shadow:0 0 35px rgba(145,71,255,0.8); }
  100% { box-shadow:0 0 15px rgba(145,71,255,0.4); }
}

/* Footer */
footer{
  padding:20px;
  font-weight:600;
  text-shadow:0 0 10px #9146FF;
}

/* Responsive Design */
@media (max-width:1000px){
  .stream, .youtube { height:420px; }
  h1{ font-size:2.4em; }
  h2{ font-size:2em; }
}

@media (max-width:700px){
  .hero{padding:100px 15px 40px;}
  .stream, .youtube { height:300px; width:100%; }
  .chat{ width:100%; height:300px; margin-bottom:15px; }
  .clip{ min-width:220px; height:150px; }
  .nav a{ font-size:0.9em; margin:0 10px; }
  h1{ font-size:2em; }
  h2{ font-size:1.7em; }
  .live-now{ font-size:1.1em; padding:10px 20px; }
  .games-logos img{ width:80px; }
}
</style>
</head>
