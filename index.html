<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deuce Prolifik | Gaming Stream</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',Arial,sans-serif;
  color:white;
  text-align:center;
  background:url("your-background.jpg") no-repeat center center fixed;
  background-size:cover;
}

/* NAV (SCROLLABLE ON MOBILE) */
.nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,.75);
  padding:12px;
  z-index:100;
  overflow-x:auto;
  white-space:nowrap;
}

.nav a{
  display:inline-block;
  margin:0 10px;
  color:#ff8c00;
  text-decoration:none;
  font-weight:700;
}

/* HERO */
.hero{
  padding-top:120px;
}

.logo{
  width:160px;
  border-radius:15px;
  box-shadow:0 0 40px #ff8c00;
}

h1{
  margin-top:10px;
  font-size:1.8em;
  text-shadow:0 0 15px #ff8c00;
}

/* LIVE BUTTON */
.live-now{
  display:inline-block;
  margin:20px 0;
  padding:12px 20px;
  border-radius:12px;
  background:linear-gradient(90deg,#ff0000,#ff8c00);
  color:white;
  text-decoration:none;
  box-shadow:0 0 20px red;
}

/* VIDEO WRAPPER */
.video-wrap{
  position:relative;
  width:95%;
  max-width:900px;
  margin:20px auto;
  border-radius:20px;
}

.video-wrap::before{
  content:"";
  position:absolute;
  inset:-4px;
  border-radius:20px;
  background:linear-gradient(45deg,#ff8c00,#ff00ff,#00ffff);
  filter:blur(15px);
  z-index:-1;
}

iframe{
  width:100%;
  height:250px; /* MOBILE HEIGHT */
  border-radius:20px;
  border:none;
}

/* SECTIONS */
.section{
  padding:50px 15px;
}

/* CLIPS */
.clip-container{
  display:flex;
  flex-direction:column; /* STACK ON MOBILE */
  align-items:center;
  gap:20px;
}

.clip-video{
  width:95%;
  max-width:400px;
  height:auto;
  border-radius:20px;
}

/* SOCIAL */
.social{
  margin-top:20px;
}

.social a{
  display:block;
  margin:10px auto;
  width:200px;
  padding:12px;
  border-radius:10px;
  background:#111;
  color:#ff8c00;
  text-decoration:none;
  box-shadow:0 0 10px #ff8c00;
}

/* SCHEDULE */
.schedule{
  background:rgba(20,20,37,.9);
  padding:20px;
  border-radius:15px;
  max-width:350px;
  margin:auto;
}

/* 🔥 DESKTOP OVERRIDES */
@media(min-width:768px){

  iframe{
    height:400px;
  }

  .clip-container{
    flex-direction:row;
    flex-wrap:wrap;
    justify-content:center;
  }

  .clip-video{
    width:400px;
    height:230px;
  }

  .social a{
    display:inline-block;
    width:auto;
  }

}
</style>
</head>

<body>

<div class="nav">
  <a href="#">Home</a>
  <a href="about.html">About Me</a>
  <a href="#stream">Stream</a>
  <a href="exmb.html">EXMB Films 🎬</a>
  <a href="#clips">Clips</a>
  <a href="#schedule">Schedule</a>
  <a href="#follow">Follow</a>
</div>

<div class="hero">
  <img src="logo.jpg" class="logo">
  <h1>DEUCE PROLIFIK</h1>

  <a href="https://www.twitch.tv/deuceprolifik" target="_blank" class="live-now">🔴 LIVE NOW</a>

  <!-- TWITCH -->
  <div class="video-wrap">
    <iframe 
      src="https://player.twitch.tv/?channel=deuceprolifik&parent=www.deuceprolifik.com"
      allowfullscreen>
    </iframe>
  </div>

  <!-- YOUTUBE -->
  <div class="video-wrap">
    <iframe src="https://www.youtube.com/embed/OGwPJytYDHM?rel=0"></iframe>
  </div>
</div>

<!-- CHAT -->
<div class="section" id="stream">
  <h2>Live Chat</h2>
  <div class="video-wrap">
    <iframe 
      src="https://www.twitch.tv/embed/deuceprolifik/chat?parent=www.deuceprolifik.com">
    </iframe>
  </div>
</div>

<!-- CLIPS -->
<div class="section" id="clips">
  <h2>🔥 Featured Gameplay</h2>
  <div class="clip-container">

    <video class="clip-video" controls>
      <source src="video1.mp4" type="video/mp4">
    </video>

    <video class="clip-video" controls>
      <source src="video2.mp4" type="video/mp4">
    </video>

  </div>
</div>

<!-- SCHEDULE -->
<div class="section" id="schedule">
  <h2>Schedule</h2>
  <div class="schedule">
    Mon: 6AM–11AM<br>
    Thu: 3PM–7PM<br>
    Fri-Sun: 6AM–11AM
  </div>
</div>

<!-- SOCIAL -->
<div class="section" id="follow">
  <h2>Follow Me</h2>
  <div class="social">
    <a href="https://www.twitch.tv/deuceprolifik">Twitch</a>
    <a href="https://www.youtube.com/@DeuceProflik">YouTube</a>
    <a href="https://www.instagram.com/deuceyp1982/">Instagram</a>
    <a href="https://www.tiktok.com/@deucey39">TikTok</a>
  </div>
</div>

<footer>© 2026 Deuce Prolifik</footer>

</body>
</html>
