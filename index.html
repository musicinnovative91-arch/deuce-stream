<style>
body{
  margin:0;
  font-family:'Orbitron',Arial,sans-serif;
  color:white;
  text-align:center;
  background:url("your-background.jpg") no-repeat center center fixed;
  background-size:cover;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,.75);
  padding:15px;
  z-index:100;
}

.nav a{
  margin:0 15px;
  color:#ff8c00;
  text-decoration:none;
  font-weight:700;
}

/* HERO */
.hero{
  padding-top:140px;
}

.logo{
  width:180px;
  border-radius:15px;
  box-shadow:0 0 40px #ff8c00;
}

h1{
  margin-top:10px;
  text-shadow:0 0 15px #ff8c00;
}

/* LIVE BUTTON */
.live-now{
  display:inline-block;
  margin:20px 0;
  padding:12px 25px;
  border-radius:12px;
  background:linear-gradient(90deg,#ff0000,#ff8c00);
  color:white;
  text-decoration:none;
  box-shadow:0 0 20px red;
}

/* VIDEO WRAPPER (GLOW FIX) */
.video-wrap{
  position:relative;
  width:90%;
  max-width:900px;
  margin:20px auto;
  border-radius:20px;
}

.video-wrap::before{
  content:"";
  position:absolute;
  inset:-5px;
  border-radius:20px;
  background:linear-gradient(45deg,#ff8c00,#ff00ff,#00ffff);
  filter:blur(20px);
  z-index:-1;
}

iframe{
  width:100%;
  height:400px;
  border-radius:20px;
  border:none;
}

/* SECTIONS */
.section{
  padding:60px 20px;
}

/* CLIPS */
.clip-container{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.clip-video{
  width:400px;
  height:230px;
  border-radius:20px;
  transition:.3s;
}

.clip-video:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #ff8c00;
}

/* SOCIAL */
.social{
  margin-top:20px;
}

.social a{
  display:inline-block;
  margin:10px;
  padding:10px 20px;
  border-radius:10px;
  background:#111;
  color:#ff8c00;
  text-decoration:none;
  box-shadow:0 0 10px #ff8c00;
  transition:.3s;
}

.social a:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #ff8c00;
}

/* SCHEDULE */
.schedule{
  background:rgba(20,20,37,.9);
  padding:20px;
  border-radius:15px;
  max-width:500px;
  margin:auto;
}
</style>
